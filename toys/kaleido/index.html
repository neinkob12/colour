<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="description" content="Kaleido — draw and watch it mirror into symmetric, rotating patterns." />
    <title>kaleido · colour</title>
  </head>
  <body class="toy">
    <canvas id="c"></canvas>

    <a class="back" href="/">&larr; index</a>

    <div class="hud">
      <div class="title">kaleido</div>
      <div class="sub">mirror world</div>
    </div>

    <div class="hint" id="hint">drag to draw &middot; it mirrors</div>

    <div class="panel">
      <div class="ctrl">
        <label>mirrors <span id="vSym">6</span></label>
        <input type="range" id="sym" min="2" max="16" value="6" step="1" />
      </div>
      <div class="ctrl">
        <label>spin <span id="vSpin">30</span></label>
        <input type="range" id="spin" min="0" max="100" value="30" step="1" />
      </div>
      <div class="ctrl">
        <label>fade <span id="vFade">8</span></label>
        <input type="range" id="fade" min="0" max="40" value="8" step="1" />
      </div>
    </div>

    <script type="module" src="./kaleido.js"></script>
  </body>
</html>
